<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Shruti Box - Tanpura Perfection V4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;600;700&display=swap');
:root{--bg:#0c0806;--surf:#161009;--surf2:#1e1510;--bdr:#2e2010;--txt:#f0ddb0;--mut:#7a6040;--pri:#c49a38;--acc:#e8622a;--gl:#3d9e7a;--head:#d4a847;--rad:20px;--rads:12px;--shad:0 8px 40px rgba(0,0,0,.7);--ff:'Segoe UI',system-ui,sans-serif}
[data-theme=warm]{--bg:#160a04;--surf:#201008;--surf2:#2a160a;--bdr:#3e1e0c}
[data-theme=cool]{--bg:#060d18;--surf:#0a1624;--surf2:#0f1e30;--bdr:#182840;--pri:#5bafd6}
[data-lang=kn]{--ff:'Noto Sans Kannada','Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--ff);min-height:100vh;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);gap:10px;flex-wrap:wrap}
.hdr-title{font-size:1.15rem;color:var(--head);font-weight:800;letter-spacing:.04em}
.hdr-sub{font-size:.6rem;color:var(--mut)}
.hdr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.lang-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--mut);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:.72rem;font-family:var(--ff);transition:.18s}
.lang-btn.active,.lang-btn:hover{background:var(--pri);color:#111;border-color:var(--pri);font-weight:700}
.clr-btn{width:16px;height:16px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.2s;flex-shrink:0}
.clr-btn.active,.clr-btn:hover{border-color:var(--pri);transform:scale(1.3)}
.mic-bar{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--surf);border-bottom:1px solid var(--bdr)}
.mic-pill{background:var(--surf2);border:1px solid var(--bdr);border-radius:30px;padding:5px 16px;cursor:pointer;font-size:.74rem;font-weight:700;color:var(--mut);transition:.2s;font-family:var(--ff)}
.mic-pill:hover{color:var(--pri);border-color:var(--pri)}
.mic-pill.on{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 0 10px #e8622a55}
.mic-track{flex:1;height:7px;background:var(--surf2);border-radius:4px;overflow:hidden;border:1px solid var(--bdr)}
.mic-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gl),var(--pri));transition:width .08s;border-radius:4px}
.mic-badge{font-size:.67rem;color:var(--mut);min-width:50px;text-align:right}
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surf);border-bottom:2px solid var(--bdr)}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;cursor:pointer;border:none;background:transparent;color:var(--mut);font-size:.65rem;font-weight:600;gap:4px;transition:.2s;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:var(--ff)}
.nav-btn .ico{font-size:1.35rem}
.nav-btn:hover{color:var(--txt);background:rgba(196,154,56,.06)}
.nav-btn.active{color:var(--pri);border-bottom-color:var(--pri)}
.panels{flex:1;overflow-y:auto;padding:16px}
.panel{display:none;max-width:640px;margin:0 auto;animation:fi .22s ease}
.panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px;margin-bottom:14px;box-shadow:var(--shad)}
.card-title{font-size:.95rem;color:var(--head);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.drone-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rads);margin-bottom:14px;flex-wrap:wrap}
.stxt{font-size:.7rem;color:var(--mut);flex:1;min-width:50px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.lbl{font-size:.67rem;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:600;flex-shrink:0}
.badge{background:var(--surf2);border:1px solid var(--bdr);border-radius:16px;padding:3px 11px;font-size:.72rem;color:var(--pri);font-weight:700}
input[type=range]{width:100%;height:4px;border-radius:2px;background:var(--surf2);border:none;outline:none;accent-color:var(--pri);cursor:pointer;margin-bottom:10px}
.seg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.seg button{flex:1;min-width:50px;padding:6px 6px;background:var(--surf2);color:var(--mut);border:1px solid var(--bdr);border-radius:var(--rads);cursor:pointer;font-size:.72rem;transition:.15s;white-space:nowrap;font-family:var(--ff)}
.seg button.on,.seg button:hover{background:var(--pri);color:#111;border-color:var(--pri);font-weight:700}
.vol-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px}
.vbtn2{padding:7px 2px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);color:var(--mut);cursor:pointer;font-size:.67rem;text-align:center;transition:.15s;font-family:var(--ff)}
.vbtn2.on,.vbtn2:hover{background:var(--pri);color:#111;border-color:var(--pri);font-weight:700}
.pitch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
.pk{padding:7px 3px;border-radius:9px;border:1px solid var(--bdr);background:var(--surf2);cursor:pointer;font-size:.65rem;text-align:center;transition:.15s;display:flex;flex-direction:column;gap:2px;color:var(--mut)}
.pk .sw{font-size:.8rem;font-weight:700;color:var(--txt)}.pk .nt{font-size:.57rem;color:var(--mut)}
.pk.on{background:var(--pri);border-color:var(--pri)}.pk.on .sw,.pk.on .nt{color:#111}.pk.lit{background:rgba(196,154,56,.12);border-color:var(--pri)}
.btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.bp{background:linear-gradient(135deg,var(--pri),#9a7418);color:#111;font-weight:700;padding:9px 16px;border-radius:var(--rads);border:none;cursor:pointer;font-size:.76rem;transition:.15s;font-family:var(--ff)}
.bp:hover{filter:brightness(1.12)}
.bs{background:var(--surf2);color:var(--mut);padding:9px 12px;border-radius:var(--rads);border:1px solid var(--bdr);cursor:pointer;font-size:.76rem;transition:.15s;font-family:var(--ff)}
.bs:hover{background:var(--bdr);color:var(--txt)}
.tiny{font-size:.63rem;color:var(--mut);margin-top:4px}
.tala-sel{width:100%;padding:9px 12px;border-radius:var(--rads);background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);font-size:.78rem;outline:none;cursor:pointer;margin-bottom:10px;font-family:var(--ff)}
.tala-leds{display:flex;flex-wrap:wrap;gap:5px;min-height:36px;margin:8px 0}
.led{width:30px;height:30px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:700;color:var(--mut);transition:.12s}
.led.sam{background:#e8622a;color:#fff;border-color:#e8622a;box-shadow:0 0 8px #e8622a55}
.led.kali{background:var(--pri);color:#111;border-color:var(--pri)}
.led.ki{background:var(--gl);color:#fff;border-color:var(--gl)}
.led.active{transform:scale(1.28)}
.tala-legend{font-size:.62rem;color:var(--mut);display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.raga-info{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rads);padding:10px;font-size:.74rem;min-height:50px;line-height:1.7;margin-bottom:10px}
.sw-pill{display:inline-block;padding:2px 8px;border-radius:12px;border:1px solid var(--bdr);background:var(--surf);margin:2px;font-size:.68rem}
.sw-pill.vadi{background:var(--pri);color:#111}.sw-pill.samvadi{background:var(--gl);color:#fff}
.scale-row{display:flex;gap:8px;align-items:baseline;margin-bottom:7px}
.scale-lbl{color:var(--mut);min-width:88px;font-size:.67rem;font-weight:700;text-transform:uppercase;flex-shrink:0}
.scale-val{color:var(--pri);font-weight:700;letter-spacing:.06em;font-size:.84rem;word-break:break-all}
.voice-row{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 12px}
.vbtn{background:var(--surf2);border:1px solid var(--bdr);color:var(--mut);padding:6px 10px;border-radius:var(--rads);cursor:pointer;font-size:.72rem;transition:.15s;font-family:var(--ff)}
.vbtn:hover{background:var(--pri);color:#111}
.piano{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0}
.key{padding:5px 2px;border-radius:6px;border:1px solid var(--bdr);background:var(--surf2);color:var(--mut);cursor:pointer;font-size:.62rem;flex:1;min-width:24px;text-align:center;transition:.15s}
.key.sa{background:rgba(196,154,56,.18);color:var(--pri)}.key.lit{background:rgba(196,154,56,.15);border-color:var(--pri)}.key:hover{background:var(--pri);color:#111}
.out{font-size:.88rem;font-weight:700;color:var(--pri);font-family:monospace;min-height:50px;background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rads);padding:9px;white-space:pre;line-height:1.5;margin-bottom:10px}
.ttl{font-size:.66rem;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:8px 0 5px}
.cents-track{position:relative;height:13px;background:var(--surf2);border-radius:7px;border:1px solid var(--bdr);margin:5px 0 10px;overflow:hidden}
.cents-center{position:absolute;left:50%;top:0;width:2px;height:100%;background:var(--bdr);transform:translateX(-50%)}
.cents-needle{position:absolute;top:1px;width:10px;height:10px;border-radius:50%;background:var(--acc);transform:translateX(-50%);transition:left .1s;left:50%}
.cents-needle.in-tune{background:#4caf50;box-shadow:0 0 6px #4caf50}
.cents-labs{display:flex;justify-content:space-between;font-size:.59rem;color:var(--mut);margin-bottom:8px}
.canvas-wrap{border-radius:var(--rads);overflow:hidden;border:1px solid var(--bdr);margin-bottom:10px}
canvas{display:block;width:100%;height:68px}
.raga-bars .rbar{display:flex;align-items:center;gap:7px;margin:4px 0;font-size:.73rem}
.raga-bars .rnm{min-width:115px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--txt)}
.raga-bars .rfill{height:10px;border-radius:4px;background:linear-gradient(90deg,var(--gl),var(--pri));min-width:3px;transition:width .35s}
.swara-hist{display:flex;gap:3px;align-items:flex-end;height:54px;margin:5px 0 10px}
.hist-col{display:flex;flex-direction:column;align-items:center;flex:1}
.hist-bar-outer{flex:1;display:flex;align-items:flex-end;width:100%}
.hist-bar{width:100%;background:var(--bdr);border-radius:2px 2px 0 0;transition:height .25s;min-height:2px}
.hist-bar.vadi{background:var(--pri)}
.hist-note{font-size:.49rem;color:var(--mut);margin-top:2px}.hist-note.active{color:var(--txt);font-weight:700}
.wm{text-align:center;font-size:.59rem;color:var(--mut);padding:14px;opacity:.4}
select option{background:#1e1510}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surf)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:480px){.nav-btn{font-size:.59rem;padding:10px 2px}.nav-btn .ico{font-size:1.2rem}.hdr-title{font-size:1rem}.vol-grid{grid-template-columns:repeat(3,1fr)}}

/* ────────────────────────────────────────
   LED STATUS DOT  (Green=play / Red=stop)
──────────────────────────────────────── */
/* Remove old sdot rules */
.sdot {
  width: 14px !important; height: 14px !important;
  border-radius: 50% !important;
  background: #d32f2f !important;
  box-shadow: 0 0 5px #d32f2f99, inset 0 1px 2px rgba(255,255,255,.25) !important;
  border: 1.5px solid rgba(255,255,255,.15) !important;
  display: inline-block !important;
  flex-shrink: 0 !important;
  margin-right: 8px !important;
  align-self: center !important;
  transition: background .35s, box-shadow .35s !important;
  animation: none !important;
  filter: none !important;
  font-size: 0 !important;
}
.sdot.on {
  background: #2ecc71 !important;
  box-shadow: 0 0 8px #2ecc71bb, 0 0 20px #2ecc7155, inset 0 1px 2px rgba(255,255,255,.35) !important;
  animation: led-pulse 1.4s ease-in-out infinite alternate !important;
}
@keyframes led-pulse {
  0%   { box-shadow: 0 0 5px #2ecc71aa, 0 0 12px #2ecc7133; }
  100% { box-shadow: 0 0 14px #2ecc71ee, 0 0 28px #2ecc7177; }
}

/* ────────────────────────────────────────
   START / STOP GLOWING BUTTONS
──────────────────────────────────────── */
/* ── Start Button — green, strong pulse when playing ── */
#startBtn {
  background: linear-gradient(135deg,#1e8449,#145a32) !important;
  color: #fff !important; font-weight: 800 !important;
  border: 1px solid #2ecc71 !important;
  box-shadow: 0 0 6px #2ecc7155 !important;
  transition: box-shadow .3s, filter .2s, opacity .2s !important;
}
#startBtn:hover:not(:disabled) { filter: brightness(1.2) !important; }
#startBtn.playing {
  animation: pulse-green 1s ease-in-out infinite alternate !important;
  box-shadow: 0 0 14px #2ecc71cc, 0 0 30px #2ecc7166 !important;
}
@keyframes pulse-green {
  0%   { box-shadow: 0 0 8px #2ecc71aa, 0 0 18px #2ecc7133; transform: scale(1);   }
  100% { box-shadow: 0 0 22px #2ecc71ff, 0 0 44px #2ecc7188; transform: scale(1.04); }
}

/* ── Stop Button — pulses RED when stopped, dims when playing ── */
#stopBtn {
  background: linear-gradient(135deg,#c0392b,#7b1a14) !important;
  color: #fff !important; font-weight: 800 !important;
  border: 1px solid #e74c3c !important;
  animation: pulse-red 1.2s ease-in-out infinite alternate !important;
  box-shadow: 0 0 12px #e74c3cbb, 0 0 26px #e74c3c55 !important;
  transition: opacity .3s, filter .2s !important;
}
#stopBtn:hover { filter: brightness(1.2) !important; }
@keyframes pulse-red {
  0%   { box-shadow: 0 0 8px #e74c3caa, 0 0 18px #e74c3c33; transform: scale(1);   }
  100% { box-shadow: 0 0 20px #e74c3cff, 0 0 40px #e74c3c88; transform: scale(1.04); }
}
/* Playing state: stop btn goes dim */
#stopBtn.active-stop {
  animation: none !important;
  opacity: 0.42 !important;
  box-shadow: 0 0 4px #e74c3c44 !important;
  color: #ccc !important;
}

/* ────────────────────────────────────────
   EQ WAVE  (top-center, yellow neon)
──────────────────────────────────────── */
.eq-anim {
  display: flex !important;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  height: 28px;
  margin: 0 auto 14px;
  width: 100%;
}
.eq-anim span {
  width: 4px;
  border-radius: 3px 3px 1px 1px;
  background: var(--bdr);
  height: 3px;
  transition: height .12s;
}
.eq-anim.playing span {
  background: #ffd700;
  box-shadow: 0 0 6px #ffd700cc, 0 0 14px #ffd70055;
}
.eq-anim.playing span:nth-child(1) { animation: eq .75s ease-in-out infinite alternate 0.00s; }
.eq-anim.playing span:nth-child(2) { animation: eq .90s ease-in-out infinite alternate 0.09s; }
.eq-anim.playing span:nth-child(3) { animation: eq .65s ease-in-out infinite alternate 0.18s; }
.eq-anim.playing span:nth-child(4) { animation: eq 1.05s ease-in-out infinite alternate 0.13s; }
.eq-anim.playing span:nth-child(5) { animation: eq .80s ease-in-out infinite alternate 0.06s; }
.eq-anim.playing span:nth-child(6) { animation: eq .95s ease-in-out infinite alternate 0.20s; }
.eq-anim.playing span:nth-child(7) { animation: eq .70s ease-in-out infinite alternate 0.11s; }
.eq-anim.playing span:nth-child(8) { animation: eq 1.00s ease-in-out infinite alternate 0.16s; }
.eq-anim.playing span:nth-child(9) { animation: eq .85s ease-in-out infinite alternate 0.03s; }
.eq-anim.playing span:nth-child(10){ animation: eq .60s ease-in-out infinite alternate 0.22s; }
@keyframes eq { from { height: 3px; } to { height: 26px; } }

/* ────────────────────────────────────────
   TRIAL BAR + GO PRO BUTTON
──────────────────────────────────────── */
.trial-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--surf2);
  border: 1px solid var(--bdr);
  border-radius: var(--rads);
  margin-bottom: 10px;
  font-size: .7rem; color: var(--mut);
  flex-wrap: wrap;
}
.trial-timer {
  font-weight: 800; font-family: monospace; font-size: .92rem;
  color: var(--pri); min-width: 36px;
}
.trial-bar.expired { background: #d32f2f11; border-color: #d32f2f88; }
.trial-bar.expired .trial-timer { color: #d32f2f; }
.go-pro-btn {
  margin-left: auto;
  padding: 5px 13px;
  border: none; border-radius: 20px;
  background: linear-gradient(135deg,#ffd700,#ffaa00);
  color: #111; font-weight: 900; font-size: .70rem;
  cursor: pointer; white-space: nowrap;
  letter-spacing: .04em;
  box-shadow: 0 0 10px #ffd70099, 0 0 22px #ffd70044;
  animation: gopro-glow 1.8s ease-in-out infinite alternate;
  font-family: var(--ff);
}
@keyframes gopro-glow {
  0%   { box-shadow: 0 0 8px #ffd700aa, 0 0 18px #ffd70033; }
  100% { box-shadow: 0 0 18px #ffd700ee, 0 0 36px #ffd70088; }
}
.go-pro-btn:hover { filter: brightness(1.15); transform: scale(1.05); }

/* ────────────────────────────────────────
   PRO-LOCK + WATERMARK INSIDE CARD
──────────────────────────────────────── */
.pro-locked {
  position: relative; pointer-events: none;
  opacity: .38; filter: grayscale(55%); user-select: none;
}
.pro-badge {
  display: inline-flex; align-items: center; gap:3px;
  font-size: .6rem; font-weight: 700; color: var(--pri);
  background: rgba(196,154,56,.1); border: 1px solid var(--pri);
  border-radius: 10px; padding: 2px 8px;
}
.wm-card {
  text-align: center; font-size: .56rem; color: var(--mut);
  padding: 8px 0 2px; opacity: .42;
  border-top: 1px solid var(--bdr); margin-top: 10px;
  letter-spacing: .05em;
}

</style>
</head>
<body data-theme="amber" style="padding: 16px;">

<div class="panels" style="display:block">

  <div style="position: relative; max-width: 640px; margin: 0 auto 20px;">

    

    
  </div>

    
<div class="card" style="position: relative;">

    <button class="lang-btn active" id="btnEn">EN</button>

    </div>

    <span id="trialLbl">⏱ Free Trial:</span>

  <div class="row"><span class="lbl" id="lblTune">Fine Tune</span><span class="badge" id="tuneB">0c</span></div>
  <input type="range" id="tune" min="-50" max="50" value="0">
  <div class="row"><span class="lbl" id="lblTempo">Tempo</span><span class="badge" id="tempoB">96 bpm</span></div>
  <input type="range" id="tempo" min="20" max="200" step="1" value="96">

let lang='en';

function applyLang(){
  const t=I18N[lang];
  if(!t)return;
  document.body.dataset.lang=lang;

  if(el('appH1')) el('appH1').textContent=t.appH1;
  if(el('appSub')) el('appSub').textContent=t.appSub;
  if(el('lblTonic')) el('lblTonic').textContent=t.lblTonic;
  if(el('lblVol')) el('lblVol').textContent=t.lblVol;
  if(el('lblTune')) el('lblTune').textContent=t.lblTune;
  if(el('lblTempo')) el('lblTempo').textContent=t.lblTempo;
  if(el('lblSec')) el('lblSec').textContent=t.lblSec;
  if(el('secDrone')) el('secDrone').textContent=t.secDrone;
  if(el('startBtn')) el('startBtn').textContent=t.btnStart;
  if(el('stopBtn')) el('stopBtn').textContent=t.btnStop;
  if(el('resetBtn')) el('resetBtn').textContent=t.btnReset;

  const playingText = (lang==='kn' ? 'ನುಡಿಯುತ್ತಿದೆ...' : 'Playing...');
  const offText = (lang==='kn' ? 'ಆಫ್' : 'Off');
  if(el('stxt')) el('stxt').textContent = S.drone ? playingText : offText;
  if(loaded) tx('debugTxt', t.statusReady);

  if(el('startBtn')) { 
    if(S.drone) el('startBtn').classList.add('playing'); 
    else el('startBtn').classList.remove('playing'); 
  }
  if(el('stopBtn')) { 
    if(!S.drone) el('stopBtn').classList.add('stopped'); 
    else el('stopBtn').classList.remove('stopped'); 
  }

  if(el('neonBullet')) {
    if(S.drone) el('neonBullet').classList.add('on');
    else el('neonBullet').classList.remove('on');
  }

  if(el('eqWave')) {
    if(S.drone) el('eqWave').classList.add('playing');
    else el('eqWave').classList.remove('playing');
  }

  renderPitchGrid();

  // Re-build secondary segment with translated labels
  buildSeg('secSeg', [
    {id:'pa',lbl:t.secPa},{id:'ma',lbl:t.secMa},{id:'ni',lbl:t.secNi},{id:'off',lbl:t.secOff}
  ], S.sec, v=>{ S.sec=v; if(S.drone) softRestart(); }); // instant switch

  // Tertiary segment (Pro-locked)
  if(el('lblTert')) el('lblTert').textContent=t.lblTert;
  buildSeg('tertSeg',[
    {id:'pa',lbl:t.tertPa},{id:'ma',lbl:t.tertMa},{id:'ni',lbl:t.tertNi},{id:'off',lbl:t.tertOff}
  ], S.tert, v=>{ S.tert=v; if(S.drone) softRestart(); }); // instant switch

  // Trial bar language
  if(el('trialLbl')) el('trialLbl').textContent=(lang==='kn')?'⏱ ಉಚಿತ ಅವಧಿ:':'⏱ Free Trial:';
  if(el('trialMsg')&&!trialEnded)
    el('trialMsg').textContent=(lang==='kn')?'ಅಮಿತ ಬಳಕೆಗೆ Pro ಗೆ ಅಪ್‌ಗ್ರೇಡ್ ಮಾಡಿ':'Upgrade to Pro for unlimited play';
}

function initUI(){
  el('btnEn').onclick=()=>{lang='en'; el('btnEn').classList.add('active'); el('btnKn').classList.remove('active'); applyLang();};
  el('btnKn').onclick=()=>{lang='kn'; el('btnKn').classList.add('active'); el('btnEn').classList.remove('active'); applyLang();};

  const thBtns = document.querySelectorAll('.clr-btn');
  thBtns.forEach(b=>{
    b.onclick=()=>{
      thBtns.forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      document.body.dataset.theme=b.dataset.theme;
    };
  });
}

let S={tonic:9,vol:50,tune:0,tempo:96,sec:'pa',tert:'off',drone:false,tone:'soft',inst:'tanpura'};
let ctx=null,master=null,bufs={},active=[],timer=null,loaded=false;

// Echo variables
let echoDelay=null, echoFeedback=null;

function el(i){return document.getElementById(i);}
function tx(i,t){if(el(i))el(i).textContent=t;}

function tonicHz(){return PITCHES[S.tonic].freq*Math.pow(2,S.tune/1200);}
function playRate(){return tonicHz()/440;}

function b64ToBuf(b64){
  const bin=atob(b64),u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);
  return u.buffer;
}

function applyVol() {
  if(!master) return;
  const norm = S.vol / 100;
  const gainVal = Math.min(3.5, Math.max(0.0001, norm * norm * 8.8));
  master.gain.setTargetAtTime(gainVal, ctx.currentTime, 0.05);
}

async function init(){
  if(ctx){await ctx.resume();return;}
  ctx=new(window.AudioContext||window.webkitAudioContext)();
  master=ctx.createGain();
  applyVol();
  master.connect(ctx.destination);
  await ctx.resume();
  for(const [k,v] of Object.entries(AUDIO)){
    bufs[k]=await ctx.decodeAudioData(b64ToBuf(v.slice(v.indexOf(',')+1)));
  }
  loaded=true;
  tx('debugTxt', I18N[lang].statusReady);
}

function stopAll(pauseTrial=true){
  clearTimeout(timer);timer=null;
  active.forEach(a=>{
    try{a.src.stop(0);}catch(e){}
    try{a.g.disconnect();}catch(e){}
  });
  active=[];
  S.drone=false;

  if(echoDelay){ echoDelay.disconnect(); echoDelay=null; }
  if(echoFeedback){ echoFeedback.disconnect(); echoFeedback=null; }

  if(el('eqWave')) el('eqWave').classList.remove('playing');
  if(el('startBtn')) el('startBtn').classList.remove('playing');
  if(el('stopBtn')) el('stopBtn').classList.add('stopped');
  if(el('neonBullet')) el('neonBullet').classList.remove('on');
  if(el('stopBtn')) el('stopBtn').classList.remove('active-stop');
  if(pauseTrial) pauseTrialCountdown();
}

function noteProfile(key,isFirstSa,isCycleJoinSa){
  if(S.tone==='soft'){
    if(key==='sa'&&isFirstSa)return{gain:.62,attack:.25,rel:.36};
    if(key==='sa'&&isCycleJoinSa)return{gain:.58,attack:.25,rel:.34};
    // FIX: Slower attack for Sa2 so Pa/Secondary fades into it smoothly
    if(key==='sa2')return{gain:.82,attack:.30,rel:.40};
    // FIX: Longer release for Secondary notes so they overlap Sa2
    if(key==='ni')return{gain:.55,attack:.15,rel:.70};
    if(key==='ma')return{gain:.84,attack:.15,rel:.55};
    if(key==='pa')return{gain:.86,attack:.15,rel:.55};
    return{gain:.82,attack:.15,rel:.30};
  }else{
    if(key==='sa'&&isFirstSa)return{gain:.84,attack:.15,rel:.32};
    if(key==='sa'&&isCycleJoinSa)return{gain:.78,attack:.15,rel:.30};
    if(key==='sa2')return{gain:.85,attack:.25,rel:.40};
    return{gain:.94,attack:.10,rel:.28};
  }
}

function scheduleSample(key,when,dur,baseLevel,isFirstSa=false,isCycleJoinSa=false){
  if(!bufs[key])return;
  const src=ctx.createBufferSource(),g=ctx.createGain(),p=noteProfile(key,isFirstSa,isCycleJoinSa);
  src.buffer=bufs[key];
  src.playbackRate.value=playRate();
  src.connect(g); 
  g.connect(master);

  // ECHO: Route Sa2 and Secondary notes (Pa, Ma, Ni) into the Delay Node
  if ((key === 'sa2' || key === 'pa' || key === 'ma' || key === 'ni') && echoDelay) {
    g.connect(echoDelay);
  }

  const trueBufferDur = src.buffer.duration / src.playbackRate.value;
  const safeDur = Math.min(dur, trueBufferDur - 0.08); 

  const maxR=(key==='sa2'?0.9:0.40); // Increased max release for secondary notes
  const rel=Math.min(maxR, Math.max(.08, safeDur*p.rel));
  const lvl=Math.min(1,baseLevel*p.gain);

  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(lvl, when+p.attack);

  const sustainEnd = Math.max(when + p.attack + 0.02, when + safeDur - rel);
  g.gain.setValueAtTime(lvl, sustainEnd);

  g.gain.linearRampToValueAtTime(0, when + safeDur);

  src.start(when, 0, safeDur);
  src.stop(when + safeDur + 0.05); 

  active.push({src,g});
  src.onended=()=>{try{g.disconnect();}catch(e){}};
}

function buildSeq(){
  const a=['sa'];
  if(S.sec!=='off')a.push(S.sec);
  if(S.tert!=='off')a.push(S.tert);
  a.push('sa2');
  return a;
}

let _schedNext=0;
function _schedLoop(){
  if(!S.drone||!loaded){timer=null;return;}
  const arr=buildSeq();
  const cycle=Math.max(2.4,7.0*(50/S.tempo));
  const step=cycle/arr.length;
  const level=Math.min(1,(S.tone==='soft'?1.00:1.14)/Math.sqrt(arr.length));
  const now=ctx.currentTime;
  while(_schedNext < now+1.8){
    const base=_schedNext;
    for(let i=0;i<arr.length;i++){
      const t=base+i*step;
      let finalDur=step+Math.min(step*0.85,0.40);

      if(arr[i]==='sa2'){ 
        finalDur=step*1.9; 
      } else if(i === arr.length - 2 && arr[i] !== 'sa') {
        // FIX: Extend duration of the secondary note (Pa/Ma/Ni) to crossfade deeply into Sa2
        finalDur=step*1.5;
      }

      scheduleSample(arr[i],t,finalDur,level,i===0&&arr[i]==='sa', arr[i]==='sa');
    }
    _schedNext=base+cycle;
  }
  active=active.filter(n=>{try{return n.g&&n.g.gain;}catch(e){return false;}});
  timer=setTimeout(_schedLoop,220);
}


// Instantly swap audio without touching trial timer
function softRestart(){
  clearTimeout(timer); timer=null;
  active.forEach(a=>{try{a.src.stop(0);}catch(e){}try{a.g.disconnect();}catch(e){}});
  active=[];
  if(echoDelay){echoDelay.disconnect();echoDelay=null;}
  if(echoFeedback){echoFeedback.disconnect();echoFeedback=null;}
  if(S.drone) playCycle();
}
function playCycle(){
  clearTimeout(timer);timer=null;

  // Re-initialize Echo node on play
  if(ctx) {
    if(echoDelay) echoDelay.disconnect();
    if(echoFeedback) echoFeedback.disconnect();

    echoDelay = ctx.createDelay(3.0);
    echoDelay.delayTime.value = 0.55; // 550ms echo

    echoFeedback = ctx.createGain();
    echoFeedback.gain.value = 0.22; // 22% feedback fade to prevent mudiness with multiple echoes // 28% feedback fade

    echoDelay.connect(echoFeedback);
    echoFeedback.connect(echoDelay);
    echoDelay.connect(master);
  }

  _schedNext=ctx.currentTime+0.06;
  _schedLoop();
}

function startDrone(){
  if(trialEnded) return;
  stopAll();S.drone=true;
  tx('stxt', lang==='kn' ? 'ನುಡಿಯುತ್ತಿದೆ...' : 'Playing...');
  if(el('eqWave')) el('eqWave').classList.add('playing');
  if(el('startBtn')) el('startBtn').classList.add('playing');
  if(el('stopBtn')) el('stopBtn').classList.remove('stopped');
  if(el('neonBullet')) el('neonBullet').classList.add('on');
  if(el('stopBtn')) el('stopBtn').classList.add('active-stop');
  startTrialCountdown();
  playCycle();
}

function renderPitchGrid(){
  const g=el('pitchGrid');if(!g)return;
  g.innerHTML='';
  PITCHES.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='pk'+(S.tonic===i?' on':'');
    b.innerHTML=`<div class="sw">${p.label.split(' ')[0]}</div><div class="nt">${p.label.split(' ').slice(1).join(' ')}</div>`;
    b.onclick=()=>{
      S.tonic=i;
      document.querySelectorAll('.pk').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      tx('tonicB', p.label.split(' ')[0] + ' · ' + tonicHz().toFixed(2) + ' Hz');
      if(S.drone){ softRestart(); }
    };
    g.appendChild(b);
  });
  tx('tonicB', PITCHES[S.tonic].label.split(' ')[0] + ' · ' + tonicHz().toFixed(2) + ' Hz');
}

function buildSeg(id, opts, val, cb){
  const p=el(id);if(!p)return;
  p.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.textContent=o.lbl;
    if(val===o.id)b.classList.add('on');
    b.onclick=()=>{
      Array.from(p.children).forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
      cb(o.id);
    };
    p.appendChild(b);
  });
}


// ─── Pro Trial (60 seconds per session) ─────────────────────────
let trialSeconds = 60;
let trialEnded   = false;
let trialInterval = null;

function updateTrialDisplay(){
  const m=Math.floor(trialSeconds/60), s2=trialSeconds%60;
  if(el('trialTimer')) el('trialTimer').textContent=m+':'+(s2<10?'0':'')+s2;
  if(trialSeconds<=15&&el('trialTimer')) el('trialTimer').style.color='#e53935';
}
function startTrialCountdown(){
  if(trialEnded||trialInterval) return;
  trialInterval=setInterval(()=>{
    trialSeconds--;
    updateTrialDisplay();
    if(trialSeconds<=0){
      clearInterval(trialInterval);trialInterval=null;
      trialEnded=true;
      stopAll();
      tx('stxt',lang==='kn'?'ಸಮಯ ಮೀರಿದೆ':'Trial ended');
      if(el('trialBar'))el('trialBar').classList.add('expired');
      if(el('trialMsg'))el('trialMsg').textContent=
        lang==='kn'?'Pro ಗೆ ಅಪ್‌ಗ್ರೇಡ್ ಮಾಡಿ — ಅಮಿತ ಬಳಕೆ ಪಡೆಯಿರಿ'
                   :'Trial ended — Upgrade to Pro for unlimited play.';
      if(el('startBtn')){el('startBtn').disabled=true;el('startBtn').style.opacity='0.35';el('startBtn').style.animation='none';}
    }
  },1000);
}
function pauseTrialCountdown(){
  if(trialInterval){clearInterval(trialInterval);trialInterval=null;}
}
// ─────────────────────────────────────────────────────────────────
window.onload=()=>{
  initUI();
  applyLang();
  renderPitchGrid();

  buildSeg('secSeg',[
    {id:'pa',lbl:'Pa'},{id:'ma',lbl:'Ma'},{id:'ni',lbl:'Ni'},{id:'off',lbl:'Off'}
  ], S.sec, v=>{ S.sec=v; if(S.drone) softRestart(); });

  // Tertiary (Pro-locked)
  buildSeg('tertSeg',[
    {id:'pa',lbl:'Pa'},{id:'ma',lbl:'Ma'},{id:'ni',lbl:'Ni'},{id:'off',lbl:'Off'}
  ], S.tert, v=>{ S.tert=v; if(S.drone) softRestart(); });

  // Trial display init
  updateTrialDisplay();
  if(el('goProBtn')) el('goProBtn').onclick=()=>alert(lang==='kn'?'ಶೀಘ್ರದಲ್ಲಿ ಬರಲಿದೆ! Pro ₹99/ವರ್ಷ':'Coming soon! Pro at ₹99/year');

  const vEl=el('vol');
  if(vEl){
    vEl.value=S.vol;
    vEl.oninput=(e)=>{ S.vol=+e.target.value; tx('volB', S.vol+'%'); applyVol(); };
  }

  const tnEl=el('tune');
  if(tnEl){
    tnEl.value=S.tune;
    tnEl.oninput=(e)=>{ 
      S.tune=+e.target.value; tx('tuneB', S.tune+'c'); 
      tx('tonicB', PITCHES[S.tonic].label.split(' ')[0] + ' · ' + tonicHz().toFixed(2) + ' Hz'); 
      if(S.drone){ softRestart(); }
    };
  }

  const tpEl=el('tempo');
  if(tpEl){
    tpEl.value=S.tempo;
    tpEl.oninput=(e)=>{ 
      S.tempo=+e.target.value; tx('tempoB', S.tempo+' bpm'); 
    };
  }

  if(el('startBtn')) el('startBtn').onclick = ()=>{ init().then(()=>startDrone()); };
  if(el('stopBtn')) el('stopBtn').onclick = ()=>{ stopAll(); tx('stxt', lang==='kn' ? 'ಆಫ್' : 'Off'); if(el('neonBullet'))el('neonBullet').classList.remove('on'); };
  if(el('resetBtn')) el('resetBtn').onclick = ()=>{
    stopAll();
    // Reset trial timer
    clearInterval(trialInterval); trialInterval=null;
    trialSeconds=60; trialEnded=false;
    updateTrialDisplay();
    if(el('trialBar')) el('trialBar').classList.remove('expired');
    if(el('trialMsg')) el('trialMsg').textContent=(lang==='kn')?'ಅಮಿತ ಬಳಕೆಗೆ Pro ಗೆ ಅಪ್‌ಗ್ರೇಡ್ ಮಾಡಿ':'Upgrade to Pro for unlimited play';
    if(el('startBtn')){ el('startBtn').disabled=false; el('startBtn').style.opacity=''; el('startBtn').style.animation=''; }
    if(el('trialTimer')) el('trialTimer').style.color='';
    tx('stxt', lang==='kn' ? 'ಆಫ್' : 'Off');
    S.tonic=9; S.vol=50; S.tune=0; S.tempo=96; S.sec='pa'; S.tert='off';
    renderPitchGrid();
    if(vEl) { vEl.value=50; tx('volB', '50%'); applyVol(); }
    if(tnEl) { tnEl.value=0; tx('tuneB', '0c'); }
    if(tpEl) { tpEl.value=96; tx('tempoB', '96 bpm'); }
    buildSeg('secSeg',[{id:'pa',lbl:'Pa'},{id:'ma',lbl:'Ma'},{id:'ni',lbl:'Ni'},{id:'off',lbl:'Off'}],S.sec,v=>{S.sec=v;});
    buildSeg('tertSeg',[{id:'pa',lbl:'Pa'},{id:'ma',lbl:'Ma'},{id:'ni',lbl:'Ni'},{id:'off',lbl:'Off'}],S.tert,v=>{S.tert=v;});
  };
};
